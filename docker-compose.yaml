services:
  eventhive-db:
    container_name: eventhive-dev-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kevinngo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-password}
      POSTGRES_DB: ${POSTGRES_DB:-eventhive_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - eventhive_pgdata:/var/lib/postgresql/data
    ports:
      - "5333:5432"
    networks:
      - db
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kevinngo} -d ${POSTGRES_DB:-eventhive_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  db:
    driver: bridge

volumes:
  eventhive_pgdata: 